<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><title>Mediatio Metricas</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f172a;color:#e2e8f0;font-family:system-ui;padding:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;max-width:1300px;margin:0 auto}.card{background:#1e293b;border-radius:10px;padding:15px;border:1px solid #334155}.card h2{font-size:15px;color:#f1f5f9;margin-bottom:12px}.bar{display:flex;align-items:center;gap:8px;margin-bottom:6px}.bl{width:130px;text-align:right;font-size:11px;color:#cbd5e1}.bt{flex:1;height:22px;background:#334155;border-radius:5px;overflow:hidden}.bf{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:700;color:#fff}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:10px}.cd{background:#334155;border-radius:4px;padding:4px;min-height:45px}.ch{background:transparent;color:#94a3b8;text-align:center;min-height:auto;padding:2px;font-weight:700}.cn{font-weight:700;color:#f1f5f9;font-size:11px}.cv{background:#3b82f6;color:#fff;font-size:8px;padding:1px 3px;border-radius:2px;margin:1px 0;display:inline-block}.cv.ok{background:#22c55e}.cv.nw{background:#f59e0b}.mr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #334155;font-size:12px}.mr:last-child{border:0}.mv{font-weight:700;color:#f1f5f9}.inv h3{color:#a78bfa;font-size:14px}.inv-item{background:#1e293b;border-radius:6px;padding:10px;margin-bottom:6px;border:1px solid #334155}.inv-item .name{font-weight:700;color:#f1f5f9}.inv-item .amount{font-size:20px;font-weight:800;color:#4ade80}.inv-item .reason{font-size:10px;color:#94a3b8;margin-top:3px}.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700}.bg-p{background:#8b5cf6;color:#fff}.bg-o{background:#334155;color:#94a3b8}.bg-d{background:#ef4444;color:#fff}</style></head><body><div style="text-align:center;margin-bottom:20px"><h1>Mediatio - Metricas de Anuncios</h1><p>17/05/2026 | 8 veiculos | R$250 disponevel</p></div><div class="grid"><div class="card"><h2>Clmques por Veiculo</h2><div id="chart"></div></div><div class="card"><h2>Calendario - Maio 2026</h2><div class="cal" id="cal"></div></div><div class="card"><h2>Metricas Detalhadas</h2><div id="metrics"></div></div><div class="card inv"><h3>Onde Investir R$250</h3><div id="invest"></div></div></div><script>var D=[{n:"Astra 2009",c:92,d:6,cd:15.3,p:37000,s:"11/05",st:"Ativo",b:0},{n:"Polo 2018",c:69,d:2,cd:34.5,p:0,s:"12/05",st:"Final. 13/05",b:1},{n:"up! 2017",c:57,d:4,cd:14.3,p:56900,s:"13/05",st:"Ativo",b:0},{n:"Renegade",c:42,d:3,cd:14.0,p:0,s:"12/05",st:"Final. 14/05",b:1},{n:"Fox 2021",c:36,d:4,cd:9.0,p:71900,s:"13/05",st:"Ativo",b:0},{n:"Amarok",c:19,d:1,cd:19.0,p:130000,s:"16/05",st:"Ativo",b:0},{n:"Strada",c:18,d:1,cd:18.0,p:97000,s:"16/05",st:"Ativo",b:0},{n:"Civic",c:12,d:1,cd:12.0,p:0,s:"16/05",st:"Ativo",b:0}];var M=Math.max.apply(null,D.map(function(d){return d.c}));var ch=document.getElementById("chart");D.forEach(function(d){var p=d.c/M*100;var cl="x";if(d.b==1)cl="purple";else if(d.c>70)cl="green";else if(d.c>40)cl="blue";else if(d.c>15)cl="orange";else cl="red";var colors={"green":"#22c55e","blue":"#3b82f6","orange":"#f59e0b","red":"#ef4444","purple":"#8b5cf6"};var bg=d.b==1?'<span class="badge bg-p">T</span>':'<span class="badge bg-o">O</span>';ch.innerHTML+='<div class="bar"><div class="bl">'+d.n+" "+bg+'</div><div class="bt"><div class="bf" style="width:'+p+'%;background:'+colors[cl]+'">'+d.c+' cliques</div></div></div>'});var ca=document.getElementById("cal");["Dom","Seg","Ter","Qua","Qui","Sex","Sab"].forEach(function(d){ca.innerHTML+='<div class="cd ch">'+d+'</div>'});var fd=new Date(2026,4,1).getDay();for(var i=0;i<fd;i++)ca.innerHTML+='<div class="cd"></div>';var ev={11:"Astra",12:"Polo,Renegade",13:"up!,Fox",16:"Amarok,Strada,Civic"};for(var d=1;d<=17;d++){var h='<div class="cd"'+(d===17?" style='border:2px solid #f59e0b'":"")+'><div class="cn">'+d+'</div>';if(ev[d]){var cs=ev[d].split(",");cs.forEach(function(c){var cls=c.includes("Polo")||c.includes("Renegade")?"ok":"nw";h+='<div class="cv '+cls+'">'+c+'</div>'})}h+='</div>';ca.innerHTML+=h}var me=document.getElementById("metrics");D.forEach(function(d){var bg=d.b==1?'<span class="badge bg-p">Turbinado</span>':'<span class="badge bg-o">Organico</span>';if(d.st.includes("Final"))bg='<span class="badge bg-d">Finalizado</span>';var pr=d.p?"R$ "+d.p.toLocaleString("pt-BR"):"--";me.innerHTML+='<div class="mr"><span>'+d.n+" "+bg+'</span><span class="mv">'+d.c+" cliques | "+d.d+"d | "+d.cd.toFixed(1)+"/dia | "+pr+"</span></div>"});var iv=document.getElementById("invest");var ac=D.filter(function(d){return d.st=="Ativo"});ac.sort(function(a,b){return b.cd-a.cd});var plan=[{n:ac[0].n,a:100,r:"Maior cliques/dia ("+ac[0].cd.toFixed(1)+"). Melhor custo-beneficio."},{n:ac[1].n,a:75,r:ac[1].c+" cliques. Menor preco (R$"+ac[1].p.toLocaleString("pt-BR")+"). Mais chance de venda."},{n:ac[2].n,a:50,r:ac[2].c+" cliques em "+ac[2].d+"ph. Excelente tracao inicial."},{n:ac[3].n,a:25,r:"Teste com orcamento minimo. "+ac[3].c+" cliques iniciais."}];plan.forEach(function(i){iu.innerHTML+='<div class="inv-item"><div class="name">'+i.n+'</div><div class="amount">R$ '+i.a+'</div><div class="reason">'+i.r+'</div></div>'});iv.innerHTML+='<p style="font-size:11px;color:#94a3b8;margin-top:8px"><b style="color:#4ade80">Total: R$250</b> | 40% top + 30% barrato + 20% novo + 10% teste</p>';</script></body></html>
