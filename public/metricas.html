<!DOCTYPE html><html lang=pt><head><meta charset=UTF-8><title>Mediatio Analytics</title><script src=https://cdn.jsdelivr.net/npm/chart.js@4></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f172a;color:#e2e8f0;font:14px system-ui,sans-serif;padding:20px}.hd{text-align:center;margin-bottom:20px}.hd h1{font-size:24px;color:#f8fafc}.hd p{color:#94a3b8;font-size:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;max-width:1400px;margin:0 auto}@media(max-width:800px){.grid{grid-template-columns:1fr}}.card{background:#1e293b;border-radius:10px;padding:16px;border:1px solid #334155}.card h2{font-size:14px;color:#f1f5f9;margin-bottom:12px}table{width:100%;border-collapse:collapse;font-size:11px}th{text-align:left;padding:6px 3px;border-bottom:2px solid #334155;color:#94a3b8;font-weight:600}td{padding:6px 3px;border-bottom:1px solid #1e293b}.bar{display:flex;align-items:center;gap:6px;margin:3px 0}.bl{width:120px;text-align:right;font-size:10px;color:#cbd5e1}.bt{flex:1;height:16px;background:#334155;border-radius:3px;overflow:hidden}.bf{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;font-size:8px;font-weight:700;color:#fff}.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700}.tg{background:#166534;color:#4caf80}.ty{background:#422006;color:#fbbf24}.tr{background:#3c0000;color:#f87171}.inv-i{background:#0f172a;border-radius:8px;padding:12px;margin-bottom:8px}.inv-t{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.inv-t b{color:#f1f5f9}.inv-t span{color:#a78bfa;font-weight:700}.inv-v{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;font-size:11px}.inv-l{color:#94a3b8;font-size:9px}.inv-n{font-size:16px;font-weight:700;color:#f8fafc;margin:2px 0}.inv-s{font-size:9px;color:#94a3b8}</style></head><body><div class=hd><h1>Mediatio - Analise de Anuncios</h1><p>Baseado em benchmarks reais Facebook Marketplace Brasil 2024-2025 | CPC R$1,80 | CTR 2,5% | Click-Lead 2% | Lead-Venda 15%</p></div><div class=grid><div class=card style=grid-column:1/-1><h2>Metricas Consolidadas | Estimativa de Leads e Probabilidade de Venda</h2><table id=mtable></table></div><div class=card><h2>Probabilidade de Venda por Veiculo</h2><div id=probChart></div></div><div class=card><h2>Simulacao de Investimento (R$250)</h2><div class=inv id=inv></div></div></div><script>var D=[{n:"Astra 2009",c:92,d:6,p:37000,fi:35000},{n:"Polo 2018",c:69,d:2,p:60000,fi:60000},{n:"up! 2017",c:57,d:4,p:56900,fi:45000},{n:"Renegade",c:42,d:3,p:85000,fi:85000},{n:"Fox 2021",c:36,d:4,p:71900,fi:50000},{n:"Amarok",c:19,d:1,p:130000,fi:120000},{n:"Strada",c:18,d:1,p:97000,fi:92000},{n:"Civic",c:12,d:1,p:95000,fi:95000}];function ld(c,b){return Math.round(c*(b?0.05:0.025))}function pr(l,p,fi){var r=l*0.15;if(fi&&p){var d=(fi-p)/fi;if(d>0.05)r*=2;else if(d>0.02)r*=1.5;else if(d<0)r*=0.7}return Math.min(r,1)}function tcol(p){return p>=0.2?"#4caf80":p>=0.1?"#fbbf24":"#f87171"}function ttag(p){return p>=0.2?"tg":p>=0.1?"ty":"tr"}function ttxt(p){return p>=0.2?"ALTA":p>=0.1?"MEDIA":"BAIXA"}var mt=document.getElementById("mtable");mt.innerHTML="<tr><th>Veiculo</th><th>Cliques</th><th>Dias</th><th>Preco</th><th>FIPE</th><th>Leads</th><th>Prob. Venda</th><th>Intens.</th></tr>";var prs=[];D.forEach(function(d){var l=ld(d.c,d.p<d.fi);var p=pr(l,d.p,d.fi);prs.push(Math.round(p*100));var pc=Math.round(p*100);mt.innerHTML+="<tr><td><b>"+d.n+"</b></td><td>"+d.c+"</td><td>"+d.d+"</td><td>"+(d.p?"R$ "+d.p.toLocaleString("pt-BR"):"--")+"</td><td>R$ "+d.fi.toLocaleString("pt-BR")+"</td><td>"+l+"</td><td><div class=bar><div class=bt><div class=bf style=width:"+pc+"%;background:"+tcol(p)+">"+pc+"%</div></div></div></td><td><span class=tag "+ttag(p)+">"+ttxt(p)+"</span></td></tr>"});var pcdiv=document.getElementById("probChart");D.forEach(function(d,i){var l=ld(d.c,d.p<d.fi);var p=pr(l,d.p,d.fi);var pc=Math.round(p*100);pcdiv.innerHTML+="<div class=bar><div class=bl>"+d.n+"</div><div class=bt><div class=bf style=width:"+pc+"%;background:"+tcol(p)+">"+pc+"% ("+l+" leads)</div></div></div>"});pcdiv.innerHTML+="<canvas id=gchart height=200></canvas>";new Chart(document.getElementById("gchart"),{type:"bar",data:{labels:D.map(function(d){return d.n}),datasets:[{label:"Chance de Venda (%)",data:prs,backgroundColor:prs.map(function(p){return p>=20?"#4caf80":p>=10?"#fbbf24":"#f87171"}),borderRadius:6}]},options:{indexAxis:"y",plugins:{legend:{labels:{color:"#94a3b8"}}},scales:{x:{beginAtZero:true,max:100,ticks:{color:"#64748b"},grid:{color:"#1e293b"}},y:{ticks:{color:"#94a3b8"}}}}});var inv=document.getElementById("inv");inv.innerHTML="<p style=font-size:10px;color:#94a3b8;margin-bottom:10px>R$250 distribui 40% top performer + 30% abaixo FIPE + 20% novo + 10% teste</p>";var cs=[{v:"Amarok 2018",b:100,c:19,p:130000,fi:120000},{v:"up! 2017",b:75,c:57,p:56900,fi:45000},{v:"Astra 2009",b:50,c:92,p:37000,fi:35000},{v:"Strada 2023",b:25,c:18,p:97000,fi:92000}];cs.forEach(function(i){var xc=Math.round(i.b/1.80);var nc=i.c+xc;var nl=ld(nc,true);var np=pr(nl,i.p,i.fi);var npp=Math.round(np*100);inv.innerHTML+="<div class=inv-i><div class=inv-t><b>"+i.v+"</b><span>R$ "+i.b+"</span></div><div class=inv-v><div><div class=inv-l>Organico</div><div class=inv-n>"+i.c+"</div><div class=inv-s>cliques</div></div><div><div class=inv-l>+Turbinado</div><div class=inv-n style=color:#60a5fa>"+xc+"</div><div class=inv-s>cliques est.</div></div><div><div class=inv-l>Chance Venda</div><div class=inv-n style=color:"+tcol(np)+">"+npp+"%</div><div class=inv-s>"+nl+" leads</div></div></div></div>"});</script></body></html>
